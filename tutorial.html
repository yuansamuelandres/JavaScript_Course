<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="JS Tutorial">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JS Tutorial</title>
    </head>
    <body style="margin: 1.5rem;
                font-weight: bold;
                font-family: Arial, Helvetica, sans-serif;">
        <div class="container">
            <div class="form">
                <input type="text" class="input">
                <input type="submit" class="add" value="Add Task">
            </div>
            <div class="tasks"></div>
        </div>
        <style>
            .form,
            .tasks {
                background-color: #ddd;
                width: 85%;
                padding: 1.5rem;
                min-height: 1rem;
                border-radius: 1rem;
            }
            .container {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                justify-content: center;
                align-items: center;
            }
            .form {
                display: grid;
                grid-template-columns: 6fr 1fr;
                gap: 1rem;
            }
            .input {
                min-height: 2.5rem;
                border: none;
                font-weight: bold;
                font-family: Arial, Helvetica, sans-serif;
                font-size: large;
                padding-inline: 0.5rem;
            }
            .add, button {
                border: none;
                padding: 0.5rem;
                border-radius: 0.5rem;
                background-color: red;
                color: white;
                font-weight: bold;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 15px;
                cursor: pointer;
            }
            .tasks {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }
            .task {
                background-color: white;
                padding: 1.25rem;
                min-height: fit-content;
                border-radius: 1rem;
                display: grid;
                grid-template-columns: 8fr 1fr;
                align-items: center;
                font-size: medium;
            }
        </style>
        <script src="tutorial.js"></script>
    </body>
</html>
